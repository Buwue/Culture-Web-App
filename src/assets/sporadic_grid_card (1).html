<h2 class="sr-only">A card with a randomly generated mosaic grid layout, with a button to reshuffle it</h2>
<div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem;">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
    <span style="font-size: 14px; color: var(--text-secondary);">Sporadic grid</span>
    <button id="shuffle" style="font-size: 13px;"><i class="ti ti-refresh" style="font-size:14px; vertical-align:-2px; margin-right:4px;" aria-hidden="true"></i>Shuffle</button>
  </div>
  <div id="grid" style="display: grid; grid-template-columns: repeat(6, 1fr); grid-auto-rows: 32px; gap: 6px;"></div>
</div>
<script>
const ramps = ["c-purple","c-teal","c-coral","c-pink","c-gray"];
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const cols = 6;
  const rows = 6;
  const occupied = Array.from({length: rows}, () => Array(cols).fill(false));

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (occupied[r][c]) continue;
      let w = Math.min(1 + Math.floor(Math.random() * 3), cols - c);
      let h = Math.min(1 + Math.floor(Math.random() * 3), rows - r);
      outer:
      for (let hh = 0; hh < h; hh++) {
        for (let ww = 0; ww < w; ww++) {
          if (occupied[r+hh][c+ww]) { w = ww || 1; h = hh || 1; break outer; }
        }
      }
      for (let hh = 0; hh < h; hh++) {
        for (let ww = 0; ww < w; ww++) {
          occupied[r+hh][c+ww] = true;
        }
      }
      const cell = document.createElement("div");
      const ramp = ramps[Math.floor(Math.random() * ramps.length)];
      cell.className = ramp;
      cell.style.gridColumn = "span " + w;
      cell.style.gridRow = "span " + h;
      cell.style.borderRadius = "6px";
      grid.appendChild(cell);
    }
  }
}
document.getElementById("shuffle").addEventListener("click", render);
render();
</script>
